{% load wagtailimages_tags %}

<div class="container">
    <h1 class="text-center">{{ self.title }}</h1>
    <div class="card-deck">
        {% for card in self.cards %}
            {% image card.image fill-300x300 as img %}
            <div class="card">
                <img src="{{ img.url }}" alt="{{ img.alt }}" class="card-img-top" />
                <div class="card-body">
                    <h5 class="card-title">{{ card.title }}</h5>
                    <p class="card-text">{{ card.text }}</p>

                    {% if card.button_page %}
                        <a class="btn btn-primary" href="{{ card.button_page.url }}"> Learn More(Internal Url) </a>
                    {% elif card.button_url %}
                        <a class="btn btn-primary" href="{{ card.button_url }}"> Learn More(External Url) </a>
                    {% endif %}

                </div>
            </div>
        {% endfor %}
    </div>
</div>
