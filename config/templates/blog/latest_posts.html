{% extends "base.html" %}

{% load wagtailimages_tags %}

{% block  content %}

    <div class="container">
        <h2>Athor: {{ name }}</h2>
        {% for post in latest_posts %}
            <div class="row">
                <div class="col-sm-3">
                    {% image post.blog_image fill-250x250 as blog_img %}
                    <a href="{{ post.url }}">
                        <img src="{{ blog_img.url }}" alt="{{post.title}}" />
                    </a>
                </div>
                <div class="col-sm-9">
                    <a href="{{ post.url }}">
                       {{ post.custom_title }} 
                    </a>
                </div>
            </div>          
          
        {% endfor %}
    </div>


{% endblock content %}
