{% extends "base.html" %}

{% load wagtailcore_tags %}

{% block content %}

    <h1>{{ page.title}}</h1>
    <p>{{ page.intro | richtext }}</p>

    <form action="{% pageurl page%}" method="post">
        {% csrf_token %}
        {{ form.as_ul }}
        <input type="submit" value="Submit" />

    </form>

{% endblock %}
